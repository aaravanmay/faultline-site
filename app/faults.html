<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 28'%3E%3Cpath d='M3 10H17' stroke='%232563EB' stroke-width='3.4' fill='none' stroke-linecap='round'/%3E%3Cpath d='M17 10L23 18' stroke='%232563EB' stroke-width='3.4' fill='none' stroke-linecap='round'/%3E%3Cpath d='M23 18H37' stroke='%232563EB' stroke-width='3.4' fill='none' stroke-linecap='round'/%3E%3C/svg%3E">
<title>Chaos / Resilience — faultline</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css">
<style>
  /* small additions — reuse design-system variables only */
  .fault-row{display:flex;align-items:center;gap:18px}
  .fault-main{flex:1;min-width:0}
  .fault-name{font-family:var(--mono);font-size:15px;font-weight:600;letter-spacing:-.01em;color:var(--text)}
  .fault-desc{font-size:12.5px;color:var(--muted);margin-top:4px}
  .fault-foot{flex-shrink:0;text-align:right;min-width:150px}
  .fault-foot .fp{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--cyan)}
  .fault-foot .fp .den{color:var(--muted);font-weight:400}
  .fault-foot .nofp{font-size:12px;color:var(--muted)}
  .fbar{margin-top:7px;height:5px;width:130px;margin-left:auto;background:var(--border);border-radius:3px;overflow:hidden}
  .fbar i{display:block;height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--cyan));box-shadow:0 0 6px rgba(56,189,248,.45)}
  .tag-silent{background:rgba(232,163,61,.12);border:1px solid rgba(232,163,61,.22);color:var(--silent)}
  .group-label{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:8px;margin:2px 0}
  .group-label .dot{width:7px;height:7px;border-radius:50%}
  .group-label .dot.silent{background:var(--silent);box-shadow:0 0 6px rgba(232,163,61,.6)}
  .group-label .dot.hard{background:var(--crash)}
  .group-label .cnt{font-family:var(--mono);font-weight:400;color:var(--faint);text-transform:none;letter-spacing:0}
  @media(max-width:860px){.fault-row{flex-wrap:wrap;gap:10px}.fault-foot{text-align:left;min-width:0}.fbar{margin-left:0}}
</style>
</head>
<body data-page="faults">
<div class="app"><div id="shell"></div><main class="main" id="view"></main></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/supabase-config.js"></script>
<script src="/app/app.js"></script>
<script>
fl.ready(async function(ctx){
  var view=document.getElementById('view'), pid=fl.currentProject();
  view.innerHTML='<div class="wrap"><div class="skel" style="height:60px"></div>'+
    '<div class="skel" style="height:200px"></div><div class="skel" style="height:160px"></div></div>';
  var lib=await fl.getFaults(pid);
  view.innerHTML=renderFaults(lib, ctx);
});

function renderFaults(lib, ctx){
  var silent=lib.filter(function(f){return f.cat==='silent';});
  var hard=lib.filter(function(f){return f.cat==='hard';});
  var anyData=lib.some(function(f){return (f.total||0)>0;});
  var sub=(ctx.project&&((ctx.project.org_slug?ctx.project.org_slug+' / ':'')+ctx.project.slug))||'project';

  var h='<div class="wrap">';
  h+='<div class="page-head"><div>'+
     '<div class="page-title">Chaos / Resilience</div>'+
     '<div class="page-sub">Fault library for <span style="font-family:var(--mono);color:var(--cyan)">chaos</span> mode · break a tool on purpose to test if the agent has a seatbelt · '+fl.esc(sub)+'</div>'+
     '</div></div>';

  // mode explainer banner
  h+='<div class="banner info" style="align-items:flex-start"><svg width="15" height="15" viewBox="0 0 15 15" fill="none" style="flex-shrink:0;margin-top:1px">'+
     '<path d="M7.5 3v5M7.5 10.5v1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>'+
     '<path d="M1.5 12.5L7.5 2l6 10.5H1.5Z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>'+
     '<span><b style="color:var(--text)">Chaos mode is a resilience test, not a bug-finder.</b> Faultline deliberately breaks one tool at a time and checks whether the agent detects the fault and recovers — or silently acts on bad data. '+
     'A pass here means the agent has a seatbelt. The actual defects in your agent logic are caught by <a href="scenarios.html" style="color:var(--accent)">scenarios</a>, '+
     '<a href="runs.html?mode=probe" style="color:var(--accent)">probe/fuzz</a>, and <a href="regressions.html" style="color:var(--accent)">replay</a>.</span></div>';

  if(!anyData){
    h+='<div class="banner info"><svg width="15" height="15" viewBox="0 0 15 15" fill="none" style="flex-shrink:0">'+
       '<circle cx="7.5" cy="7.5" r="6" stroke="currentColor" stroke-width="1.2"/><path d="M7.5 4.2v.2M7.5 6.8v4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>'+
       'Run a chaos check to see which faults your agents survive.</div>';
  }

  h+=group('silent','Silent faults', 'Returns 200 OK — but the data is wrong. The agent must detect and refuse to act on it.', silent);
  h+=group('hard','Hard faults', 'The tool call fails loudly with an error or timeout. The agent must handle it gracefully.', hard);

  if(!anyData){
    h+='<div class="empty"><div class="seam"></div><h2>No resilience data yet</h2>'+
       '<p>Each fault above can be injected into your agent\'s tools during a chaos run. Run a check to see which faults the agent recovers from — and which slip through silently.</p>'+
       '<div class="row" style="gap:10px"><a class="btn pri" href="integrations.html">Run a chaos check →</a>'+
       '<a class="btn sec" href="scenarios.html">Try scenarios instead</a></div></div>';
  }

  h+='</div>';
  return h;
}

function group(kind, title, blurb, faults){
  var n=faults.filter(function(f){return (f.total||0)>0;}).length;
  var h='<div class="card glow hairline"><div class="card-head"><div>'+
    '<div class="card-title group-label"><span class="dot '+kind+'"></span>'+fl.esc(title)+
      '<span class="cnt">'+faults.length+' fault'+(faults.length===1?'':'s')+(n?(' · '+n+' tested'):'')+'</span></div>'+
    '<div class="card-meta">'+fl.esc(blurb)+'</div></div></div>';
  faults.forEach(function(f,i){
    h+=faultRow(kind, f, i===faults.length-1);
  });
  h+='</div>';
  return h;
}

function faultRow(kind, f, last){
  var total=f.total||0, caught=f.caught||0;
  var pct=total>0?Math.round((caught/total)*100):0;
  var border=last?'':'border-bottom:1px solid var(--border)';
  var badge='<span class="fault-tag '+(kind==='silent'?'tag-silent':'')+'">'+fl.esc(kind)+'</span>';
  var foot;
  if(total>0){
    foot='<div class="fp">'+caught+'<span class="den">/'+total+' caught</span></div>'+
         '<div class="fbar"><i style="width:'+pct+'%"></i></div>';
  } else {
    foot='<div class="nofp">no data yet — run a check</div>';
  }
  return '<div class="card-pad fault-row" style="'+border+'">'+
    '<div class="fault-main">'+
      '<div class="row" style="gap:10px"><span class="fault-name">'+fl.esc(f.name)+'</span>'+badge+'</div>'+
      '<div class="fault-desc">'+fl.esc(f.desc)+'</div>'+
    '</div>'+
    '<div class="fault-foot">'+foot+'</div>'+
  '</div>';
}
</script>
</body>
</html>
