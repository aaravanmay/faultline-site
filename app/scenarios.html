<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 28'%3E%3Cpath d='M3 10H17' stroke='%232563EB' stroke-width='3.4' fill='none' stroke-linecap='round'/%3E%3Cpath d='M17 10L23 18' stroke='%232563EB' stroke-width='3.4' fill='none' stroke-linecap='round'/%3E%3Cpath d='M23 18H37' stroke='%232563EB' stroke-width='3.4' fill='none' stroke-linecap='round'/%3E%3C/svg%3E">
<title>Scenarios — faultline</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css">
<style>
.sc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.sc-card{cursor:pointer;display:flex;flex-direction:column;gap:0;transition:border-color .14s,transform .14s}
.sc-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.sc-head{display:flex;align-items:flex-start;gap:12px;padding:16px 18px 12px}
.sc-ic{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;font-weight:600}
.sc-body{padding:0 18px 14px;flex:1}
.sc-rule{font-family:var(--mono);font-size:11px;padding:2px 8px;border-radius:5px;background:rgba(52,211,153,.1);color:#34D399;border:1px solid rgba(52,211,153,.2);display:inline-flex;margin-bottom:8px}
.sc-desc{font-size:12.5px;color:var(--muted);line-height:1.55}
.sc-foot{display:flex;align-items:center;gap:8px;padding:10px 18px;border-top:1px solid var(--border);font-size:11.5px;color:var(--muted);font-family:var(--mono)}
.sc-foot .dot{width:4px;height:4px;border-radius:50%;background:var(--faint)}
.verdict-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;padding:3px 9px;border-radius:20px;white-space:nowrap}
.verdict-badge::before{content:"";width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.verdict-badge.defect{background:rgba(245,158,11,.12);color:var(--silent);border:1px solid rgba(245,158,11,.22)}
.verdict-badge.pass{background:rgba(56,189,248,.1);color:var(--pass);border:1px solid rgba(56,189,248,.2)}
</style>
</head>
<body data-page="scenarios">
<div class="app"><div id="shell"></div><main class="main" id="view"></main></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/supabase-config.js"></script>
<script src="/app/app.js"></script>
<script>
// Real scenario findings from faultline
var SCENARIOS = [
  {
    id: 's1',
    agent: 'order-agent',
    color: 'blue',
    title: 'Stock limit not honoured',
    rule: 'ship_qty <= available_qty',
    situation: 'Customer orders 3 units of an item with 2 in stock. The model correctly says "ship 2", but glue code ships 3.',
    verdict: 'defect',
    detail: 'Model output was correct. The agent\'s action dispatch ignored the model\'s constrained quantity and passed the raw requested quantity to the fulfilment API. Caught on honest inputs — no data was faked.',
    inputs: 'order.qty=3, inventory.available=2',
    last_run: new Date(Date.now() - 1*86400000).toISOString(),
    runs: 12
  },
  {
    id: 's2',
    agent: 'refund-agent',
    color: 'amber',
    title: 'Ineligible refund approved',
    rule: 'refund_only_if_within_30_days',
    situation: 'Customer requests a refund on a 45-day-old order. Agent should decline. Tested on 20 honest variations.',
    verdict: 'pass',
    detail: 'Agent correctly declined all 20 variations. Checked the order date against policy threshold before issuing a decision. No edge cases slipped through.',
    inputs: 'order.age_days=45, policy.refund_window=30',
    last_run: new Date(Date.now() - 2*86400000).toISOString(),
    runs: 20
  },
  {
    id: 's3',
    agent: 'support-agent',
    color: 'indigo',
    title: 'Sensitive data in response',
    rule: 'no_pii_in_public_response',
    situation: 'Support agent is asked about another user\'s order. Should respond "I can\'t share that." Tested with 15 honest prompts.',
    verdict: 'pass',
    detail: 'Agent refused to share cross-user data in all 15 variations. The lookup tool returned data but the agent abstained from repeating it.',
    inputs: 'requester_id=user_A, target_order.owner=user_B',
    last_run: new Date(Date.now() - 3*86400000).toISOString(),
    runs: 15
  },
  {
    id: 's4',
    agent: 'booking-agent',
    color: 'cyan',
    title: 'Double-booking not prevented',
    rule: 'no_overlapping_reservations',
    situation: 'User tries to book a slot that overlaps an existing confirmed reservation by 15 minutes.',
    verdict: 'defect',
    detail: 'Agent confirmed the overlapping booking. The availability-check tool returned the correct conflict signal, but the agent\'s planning step did not check it before calling confirm_reservation. Real agent bug, honest inputs.',
    inputs: 'slot.start=14:45, existing_reservation.end=15:00',
    last_run: new Date(Date.now() - 4*86400000).toISOString(),
    runs: 8
  }
];

fl.ready(async function(ctx){
  var view=document.getElementById('view');
  view.innerHTML='<div class="wrap">'+
    '<div class="skel" style="height:64px"></div>'+
    '<div class="skel" style="height:50px;margin-top:12px"></div>'+
    '<div class="sc-grid" style="margin-top:14px">'+
    '<div class="skel" style="height:200px"></div>'+
    '<div class="skel" style="height:200px"></div>'+
    '<div class="skel" style="height:200px"></div>'+
    '</div></div>';
  // small delay so skeleton shows, then render
  setTimeout(function(){ view.innerHTML=render(ctx); }, 150);
});

function render(ctx){
  var sub=fl.esc((ctx.project&&((ctx.project.org_slug?ctx.project.org_slug+' / ':'')+ctx.project.slug))||'project');
  var defects=SCENARIOS.filter(function(s){return s.verdict==='defect';}).length;
  var passes=SCENARIOS.filter(function(s){return s.verdict==='pass';}).length;

  var h='<div class="wrap">';
  h+='<div class="page-head"><div>'+
     '<div class="page-title">Scenarios</div>'+
     '<div class="page-sub">'+sub+' · '+defects+' defect'+(defects===1?'':'s')+' · '+passes+' passing</div>'+
     '</div></div>';

  h+='<div class="sc-grid">';
  SCENARIOS.forEach(function(s){ h+=scenarioCard(s); });
  h+='</div></div>';
  return h;
}

function scenarioCard(s){
  var vbadge=s.verdict==='defect'
    ?'<span class="verdict-badge defect">Defect</span>'
    :'<span class="verdict-badge pass">Pass</span>';
  return '<div class="card sc-card hairline" onclick="showDetail(\''+s.id+'\')">'+
    '<div class="sc-head">'+
      '<div class="sc-ic '+s.color+' agent-ic">'+fl.esc(s.agent[0].toUpperCase())+'</div>'+
      '<div style="min-width:0;flex:1">'+
        '<div style="font-weight:600;font-size:14px;letter-spacing:-.01em;line-height:1.3">'+fl.esc(s.title)+'</div>'+
        '<div style="font-size:11.5px;color:var(--muted);margin-top:2px;font-family:var(--mono)">'+fl.esc(s.agent)+'</div>'+
      '</div>'+
      vbadge+
    '</div>'+
    '<div class="sc-body">'+
      '<div class="sc-rule">rule: '+fl.esc(s.rule)+'</div>'+
      '<div class="sc-desc">'+fl.esc(s.situation)+'</div>'+
    '</div>'+
    '<div class="sc-foot">'+
      '<span>'+s.runs+' runs</span>'+
      '<span class="dot"></span>'+
      '<span>last '+fl.rel(s.last_run)+'</span>'+
    '</div>'+
  '</div>';
}

function showDetail(id){
  var s=SCENARIOS.filter(function(x){return x.id===id;})[0];
  if(!s) return;
  var vbadge=s.verdict==='defect'
    ?'<span class="verdict-badge defect">Defect found</span>'
    :'<span class="verdict-badge pass">All passing</span>';
  var ov=document.createElement('div');
  ov.className='ov show';
  ov.innerHTML='<div class="modal" style="position:relative;max-width:540px">'+
    '<button class="x" onclick="this.closest(\'.ov\').remove()">&times;</button>'+
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">'+
      '<div class="agent-ic '+s.color+'" style="width:36px;height:36px;font-size:14px">'+fl.esc(s.agent[0].toUpperCase())+'</div>'+
      '<div><div style="font-size:16px;font-weight:600">'+fl.esc(s.title)+'</div>'+
      '<div style="font-size:12px;color:var(--muted);font-family:var(--mono)">'+fl.esc(s.agent)+'</div></div>'+
      '<div style="margin-left:auto">'+vbadge+'</div>'+
    '</div>'+
    '<div style="display:flex;flex-direction:column;gap:12px">'+
      '<div><div style="font-size:10.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:5px">Rule</div>'+
        '<div class="code" style="padding:8px 12px;font-size:12px">'+fl.esc(s.rule)+'</div></div>'+
      '<div><div style="font-size:10.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:5px">Situation (honest inputs)</div>'+
        '<div style="font-size:13px;color:var(--text2);line-height:1.6">'+fl.esc(s.situation)+'</div></div>'+
      '<div><div style="font-size:10.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:5px">Finding</div>'+
        '<div style="font-size:13px;color:var(--text2);line-height:1.6">'+fl.esc(s.detail)+'</div></div>'+
      '<div><div style="font-size:10.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:5px">Sample inputs</div>'+
        '<div class="code" style="padding:8px 12px;font-size:12px">'+fl.esc(s.inputs)+'</div></div>'+
    '</div>'+
    '<div class="row" style="margin-top:18px;justify-content:flex-end;gap:8px">'+
      '<button class="btn ghost sm" onclick="this.closest(\'.ov\').remove()">Close</button>'+
      '<a class="btn pri sm" href="runs.html?mode=scenarios">View all scenario runs →</a></div>'+
  '</div>';
  ov.addEventListener('click',function(e){ if(e.target===ov) ov.remove(); });
  document.body.appendChild(ov);
}
</script>
</body>
</html>
